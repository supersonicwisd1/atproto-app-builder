<svg viewBox="0 -65 700 539" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M 0 0 L 10 3.5 L 0 7" fill="none" stroke="#00e5ff" stroke-width="1"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Oval surrounding Identity and Data -->
  <ellipse cx="350" cy="115" rx="195" ry="82" fill="#00e5ff" fill-opacity="0.04" stroke="#00e5ff" stroke-width="1.5" filter="url(#glow)"/>

  <!-- Identity Icon -->
  <circle cx="275" cy="95" r="14" fill="none" stroke="#e8e8f0" stroke-width="1.5"/>
  <path d="M 258 122 Q 258 108 275 108 Q 292 108 292 122 L 290 122 Q 290 111 275 111 Q 260 111 260 122 Z" fill="none" stroke="#e8e8f0" stroke-width="1.5"/>
  <text x="275" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#e8e8f0">Your Identity</text>

  <!-- Data Icon -->
  <ellipse cx="425" cy="90" rx="17" ry="7" fill="none" stroke="#e8e8f0" stroke-width="1.5"/>
  <line x1="408" y1="90" x2="408" y2="115" stroke="#e8e8f0" stroke-width="1.5"/>
  <line x1="442" y1="90" x2="442" y2="115" stroke="#e8e8f0" stroke-width="1.5"/>
  <path d="M 408 115 A 17 7 0 0 0 442 115" fill="none" stroke="#e8e8f0" stroke-width="1.5"/>
  <path d="M 410 102 A 15 6 0 0 0 440 102" fill="none" stroke="#e8e8f0" stroke-width="0.75"/>
  <text x="425" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#e8e8f0">Your Data</text>

  <!-- Caption -->
  <text x="570" y="100" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#00e5ff">Owned and</text>
  <text x="570" y="122" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#00e5ff">controlled by you</text>

  <!-- Arrows from apps to oval -->
  <line x1="130" y1="290" x2="210" y2="200" stroke="#00e5ff" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="350" y1="290" x2="350" y2="205" stroke="#00e5ff" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="570" y1="290" x2="490" y2="200" stroke="#00e5ff" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Music App - Phone -->
  <rect x="116" y="300" width="28" height="50" fill="none" stroke="#e8e8f0" stroke-width="1.5" rx="5"/>
  <rect x="120" y="305" width="20" height="33" fill="none" stroke="#e8e8f0" stroke-width="0.75"/>
  <line x1="124" y1="313" x2="139" y2="313" stroke="#e8e8f0" stroke-width="0.75"/>
  <line x1="124" y1="318" x2="134" y2="318" stroke="#e8e8f0" stroke-width="0.75"/>
  <line x1="124" y1="323" x2="141" y2="323" stroke="#e8e8f0" stroke-width="0.75"/>
  <line x1="124" y1="328" x2="132" y2="328" stroke="#e8e8f0" stroke-width="0.75"/>
  <text x="130" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#e8e8f0">Music App</text>

  <!-- Social App - Computer -->
  <rect x="322" y="306" width="56" height="36" fill="none" stroke="#e8e8f0" stroke-width="1.5" rx="4"/>
  <rect x="327" y="311" width="46" height="23" fill="none" stroke="#e8e8f0" stroke-width="0.75"/>
  <line x1="331" y1="320" x2="360" y2="320" stroke="#e8e8f0" stroke-width="0.75"/>
  <line x1="331" y1="325" x2="352" y2="325" stroke="#e8e8f0" stroke-width="0.75"/>
  <line x1="331" y1="330" x2="363" y2="330" stroke="#e8e8f0" stroke-width="0.75"/>
  <text x="350" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#e8e8f0">Social App</text>

  <!-- Podcast App - Phone -->
  <rect x="556" y="300" width="28" height="50" fill="none" stroke="#e8e8f0" stroke-width="1.5" rx="5"/>
  <rect x="560" y="305" width="20" height="33" fill="none" stroke="#e8e8f0" stroke-width="0.75"/>
  <line x1="564" y1="313" x2="579" y2="313" stroke="#e8e8f0" stroke-width="0.75"/>
  <line x1="564" y1="318" x2="574" y2="318" stroke="#e8e8f0" stroke-width="0.75"/>
  <line x1="564" y1="323" x2="581" y2="323" stroke="#e8e8f0" stroke-width="0.75"/>
  <line x1="564" y1="328" x2="572" y2="328" stroke="#e8e8f0" stroke-width="0.75"/>
  <text x="570" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#e8e8f0">Podcast App</text>
</svg>
