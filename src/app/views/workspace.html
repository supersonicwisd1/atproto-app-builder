<!-- Sidebar (fixed-position, slides in when state-wizard) -->
<aside class="sidebar" id="workspace-sidebar">
  <div class="sidebar-nav" id="sidebar-nav">
    <div class="progress-fill" id="sidebar-progress-fill"></div>

    <div class="sidebar-section active" data-section="requirements">
      <div class="step-number">Step 1</div>
      <div class="sidebar-header" data-target="requirements">
        <h4>Requirements</h4>
        <span class="badge">0</span>
      </div>
      <div class="sidebar-items">
        <div class="sidebar-item-empty">None yet</div>
      </div>
    </div>

    <div class="sidebar-section" data-section="data">
      <div class="step-number">Step 2</div>
      <div class="sidebar-header" data-target="data">
        <h4>Data</h4>
        <span class="badge">0</span>
      </div>
      <div class="sidebar-items">
        <div class="sidebar-item-empty">None yet</div>
      </div>
    </div>

    <div class="sidebar-section" data-section="components">
      <div class="step-number">Step 3</div>
      <div class="sidebar-header" data-target="components">
        <h4>Blocks</h4>
        <span class="badge">0</span>
      </div>
      <div class="sidebar-items">
        <div class="sidebar-item-empty">None yet</div>
      </div>
    </div>

    <div class="sidebar-section" data-section="views">
      <div class="step-number">Step 4</div>
      <div class="sidebar-header" data-target="views">
        <h4>Views</h4>
        <span class="badge">0</span>
      </div>
      <div class="sidebar-items">
        <div class="sidebar-item-empty">None yet</div>
      </div>
    </div>

    <div class="sidebar-section" data-section="generate">
      <div class="step-number">Step 5</div>
      <div class="sidebar-header" data-target="generate">
        <h4>Generate</h4>
        <span class="badge" style="display:none"></span>
      </div>
      <div class="sidebar-items">
        <div class="sidebar-item-empty">Configure &amp; generate</div>
      </div>
    </div>
  </div>

  <!-- PDS save button (hidden when logged out, shown via JS) -->
  <div class="sidebar-save" id="sidebar-save" hidden>
    <button class="sidebar-save-btn" id="sidebar-save-btn">
      <span class="save-icon">&#9729;</span>
      Save to PDS
    </button>
    <div class="sidebar-save-status" id="sidebar-save-status"></div>
  </div>
</aside>

<!-- Workspace content area (shifts right when sidebar is visible) -->
<div class="workspace" id="workspace-content">
  <div class="workspace-header" id="workspace-panel-header">
    <!-- Panel header rendered dynamically by panel renderers -->
  </div>
  <div class="workspace-body" id="workspace-panel-body">
    <!-- Panel content rendered dynamically by panel renderers -->
  </div>
</div>

<!-- Accordion layout (visible below 768px, replaces sidebar + workspace) -->
<div class="accordion" id="workspace-accordion">
  <div class="accordion-section active" data-section="requirements">
    <div class="accordion-header" data-target="requirements">
      <div class="accordion-dot"></div>
      <div class="accordion-header-content">
        <div class="accordion-title">Requirements</div>
        <div class="accordion-summary">None yet</div>
      </div>
      <span class="accordion-badge">0</span>
      <span class="accordion-chevron">&#9662;</span>
    </div>
    <div class="accordion-body">
      <!-- Panel content rendered dynamically -->
    </div>
  </div>

  <div class="accordion-section" data-section="data">
    <div class="accordion-header" data-target="data">
      <div class="accordion-dot"></div>
      <div class="accordion-header-content">
        <div class="accordion-title">Data</div>
        <div class="accordion-summary">None yet</div>
      </div>
      <span class="accordion-badge">0</span>
      <span class="accordion-chevron">&#9662;</span>
    </div>
    <div class="accordion-body">
      <!-- Panel content rendered dynamically -->
    </div>
  </div>

  <div class="accordion-section" data-section="components">
    <div class="accordion-header" data-target="components">
      <div class="accordion-dot"></div>
      <div class="accordion-header-content">
        <div class="accordion-title">Blocks</div>
        <div class="accordion-summary">None yet</div>
      </div>
      <span class="accordion-badge">0</span>
      <span class="accordion-chevron">&#9662;</span>
    </div>
    <div class="accordion-body">
      <!-- Panel content rendered dynamically -->
    </div>
  </div>

  <div class="accordion-section" data-section="views">
    <div class="accordion-header" data-target="views">
      <div class="accordion-dot"></div>
      <div class="accordion-header-content">
        <div class="accordion-title">Views</div>
        <div class="accordion-summary">None yet</div>
      </div>
      <span class="accordion-badge">0</span>
      <span class="accordion-chevron">&#9662;</span>
    </div>
    <div class="accordion-body">
      <!-- Panel content rendered dynamically -->
    </div>
  </div>

  <div class="accordion-section" data-section="generate">
    <div class="accordion-header" data-target="generate">
      <div class="accordion-dot"></div>
      <div class="accordion-header-content">
        <div class="accordion-title">Generate</div>
        <div class="accordion-summary">Configure &amp; generate</div>
      </div>
      <span class="accordion-badge" style="display:none"></span>
      <span class="accordion-chevron">&#9662;</span>
    </div>
    <div class="accordion-body">
      <!-- Panel content rendered dynamically -->
    </div>
  </div>

  <!-- PDS save button for narrow layout (hidden when logged out, shown via JS) -->
  <div class="accordion-save" id="accordion-save" hidden>
    <button class="sidebar-save-btn" id="accordion-save-btn">
      <span class="save-icon">&#9729;</span>
      Save to PDS
    </button>
    <div class="sidebar-save-status" id="accordion-save-status"></div>
  </div>
</div>
